<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HapticNav</title>
<style>
  body { font-family: sans-serif; background: #111; color: #eee; padding: 20px; max-width: 480px; margin: 0 auto; }
  h1 { color: #00e5ff; margin-bottom: 6px; }
  .sub { color: #555; font-size: 13px; margin-bottom: 24px; }
  label { display: block; font-size: 13px; color: #888; margin-bottom: 4px; margin-top: 14px; }
  input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #222; color: #eee; font-size: 15px; box-sizing: border-box; }
  input:focus { border-color: #00e5ff; outline: none; }
  button { width: 100%; padding: 14px; border-radius: 8px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
  .btn-go   { background: #00e5ff; color: #000; }
  .btn-go:disabled { background: #333; color: #666; cursor: not-allowed; }
  .btn-stop { background: #ff6b35; color: #fff; display: none; }
  .btn-test { background: #222; color: #eee; border: 1px solid #444; margin-top: 6px; font-size: 14px; padding: 10px; }
  .motors { display: grid; grid-template-areas: ". f ." "l c r" ". b ."; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 12px 0; }
  .m { padding: 14px 0; border-radius: 8px; border: 2px solid #333; background: #222; color: #888; font-size: 13px; text-align: center; cursor: pointer; transition: all 0.2s; }
  .m:hover { border-color: #00e5ff; color: #00e5ff; }
  .m.buzz { border-color: #00e5ff; color: #00e5ff; background: #003344; }
  .mf{grid-area:f;} .mb{grid-area:b;} .ml{grid-area:l;} .mr{grid-area:r;}
  .mc{grid-area:c;display:flex;align-items:center;justify-content:center;font-size:28px;}
  #log { background: #000; border-radius: 8px; padding: 12px; font-family: monospace; font-size: 12px; height: 130px; overflow-y: auto; margin-top: 16px; }
  .ok   { color: #00c896; }
  .err  { color: #ff6b35; }
  .info { color: #00e5ff; }
  #stepbox { display:none; background:#1a1a2a; border-radius:8px; padding:14px; margin-top:12px; border: 1px solid #00e5ff44; }
  #stepbox h3 { color:#00e5ff; margin:0 0 8px 0; font-size:13px; letter-spacing:2px; }
  #steptext { font-size:18px; font-weight:500; line-height:1.5; }
  #stepdist { font-size:13px; color:#888; margin-top:6px; }
  .nav-btns { display:flex; gap:8px; margin-top:10px; }
  .nav-btns button { margin:0; background:#222; color:#eee; font-size:14px; padding:10px; border:1px solid #333; }
  .divider { border: none; border-top: 1px solid #222; margin: 20px 0; }
  .tag { display:inline-block; background:#1a1a2a; border:1px solid #333; border-radius:4px; padding:2px 8px; font-size:11px; color:#888; font-family:monospace; }
</style>
</head>
<body>

<h1>HapticNav</h1>
<div class="sub">Haptic navigation for the visually impaired</div>

<!-- Config -->
<label>Google Maps API Key</label>
<input type="text" id="apiKey" placeholder="AIza..." oninput="saveSettings()">

<label>Arduino URL <span class="tag">ngrok HTTPS address</span></label>
<input type="text" id="arduinoUrl" placeholder="https://abc123.ngrok-free.app" oninput="saveSettings()">
<button class="btn-test" onclick="testArduino()">Test Arduino connection</button>

<hr class="divider">

<!-- Navigation -->
<label>Destination</label>
<input type="text" id="dest" placeholder="Oslo Central Station">
<button class="btn-go" id="goBtn" onclick="startNav()">▲ Start Navigation</button>
<button class="btn-stop" id="stopBtn" onclick="stopNav()">■ Stop Navigation</button>

<!-- Current step -->
<div id="stepbox">
  <h3>CURRENT STEP</h3>
  <div id="steptext">—</div>
  <div id="stepdist"></div>
  <div class="nav-btns">
    <button onclick="prevStep()">← Prev</button>
    <button onclick="nextStep()">Next →</button>
  </div>
</div>

<hr class="divider">

<!-- Motor test -->
<label>Motor Test — tap to test each motor</label>
<div class="motors">
  <div class="m mf" onclick="buzz('front')">▲<br>FRONT</div>
  <div class="m ml" onclick="buzz('left')">◀<br>LEFT</div>
  <div class="mc">🧍</div>
  <div class="m mr" onclick="buzz('right')">▶<br>RIGHT</div>
  <div class="m mb" onclick="buzz('back')">▼<br>BACK</div>
</div>

<!-- Log -->
<div id="log"><span class="ok">HapticNav ready.</span></div>

<script>
var steps = [], cur = 0, watchId = null, going = false;

// ── Persist settings in localStorage ─────────────────────────────────────────
function saveSettings() {
  localStorage.setItem('hn_apikey',     document.getElementById('apiKey').value);
  localStorage.setItem('hn_arduinourl', document.getElementById('arduinoUrl').value);
}

function loadSettings() {
  var k = localStorage.getItem('hn_apikey');
  var u = localStorage.getItem('hn_arduinourl');
  if (k) document.getElementById('apiKey').value = k;
  if (u) document.getElementById('arduinoUrl').value = u;
  if (k || u) log('Settings restored from memory', 'info');
}

// ── Logging ───────────────────────────────────────────────────────────────────
function log(msg, cls) {
  var el = document.getElementById('log');
  var t  = new Date().toLocaleTimeString('en', {hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
  el.innerHTML += '<br><span class="'+(cls||'')+'">['+ t +'] ' + msg + '</span>';
  el.scrollTop = el.scrollHeight;
}

// ── Arduino communication ─────────────────────────────────────────────────────
function getArduinoUrl() {
  var url = document.getElementById('arduinoUrl').value.trim();
  // strip trailing slash
  return url.replace(/\/$/, '');
}

function motor(dir) {
  var base = getArduinoUrl();
  if (!base) return;
  fetch(base + '/direction?dir=' + dir, {
    method: 'GET',
    headers: { 'ngrok-skip-browser-warning': 'true' }
  }).catch(function(e){ log('Motor err: ' + e.message, 'err'); });
}

async function testArduino() {
  var base = getArduinoUrl();
  if (!base) { log('Enter Arduino URL first', 'err'); return; }
  log('Testing ' + base + ' ...', 'info');
  try {
    var res = await fetch(base + '/direction?dir=front', {
      signal: AbortSignal.timeout(5000),
      headers: { 'ngrok-skip-browser-warning': 'true' }
    });
    if (res.ok) { log('Arduino connected! Front motor buzzed ✓', 'ok'); buzz('front'); }
    else         { log('Arduino replied with error: ' + res.status, 'err'); }
  } catch(e) {
    log('Cannot reach Arduino: ' + e.message, 'err');
    log('Make sure ngrok is running and URL is correct', 'err');
  }
}

// ── Motor UI flash ────────────────────────────────────────────────────────────
function buzz(dir) {
  motor(dir);
  var map = { front:'f', back:'b', left:'l', right:'r' };
  var btn = document.querySelector('.m' + map[dir]);
  if (btn) { btn.classList.add('buzz'); setTimeout(function(){ btn.classList.remove('buzz'); }, 600); }
}

// ── Direction helpers ─────────────────────────────────────────────────────────
function dirFrom(maneuver) {
  if (!maneuver) return 'front';
  var m = maneuver.toLowerCase();
  if (m.indexOf('left')  > -1) return 'left';
  if (m.indexOf('right') > -1) return 'right';
  if (m.indexOf('uturn') > -1) return 'back';
  return 'front';
}

function strip(html) { var d = document.createElement('div'); d.innerHTML = html; return d.textContent; }

// ── Steps ─────────────────────────────────────────────────────────────────────
function showStep(i) {
  if (i >= steps.length) { arrive(); return; }
  cur = i;
  var s = steps[i];
  document.getElementById('steptext').textContent = s.instruction;
  document.getElementById('stepdist').textContent = s.distText;
  document.getElementById('stepbox').style.display = 'block';
  if (s.maneuver !== 'destination') {
    var dir = dirFrom(s.maneuver);
    log('Step ' + (i+1) + ': ' + s.instruction + ' → ' + dir.toUpperCase(), 'info');
    buzz(dir);
  } else { arrive(); }
}

function nextStep() { if (cur < steps.length-1) showStep(cur+1); }
function prevStep() { if (cur > 0) showStep(cur-1); }

function arrive() {
  log('🎯 Arrived at destination!', 'ok');
  motor('arrive');
  stopNav();
}

function stopNav() {
  going = false;
  if (watchId) { navigator.geolocation.clearWatch(watchId); watchId = null; }
  document.getElementById('goBtn').style.display   = 'block';
  document.getElementById('stopBtn').style.display = 'none';
  document.getElementById('stepbox').style.display = 'none';
}

// ── Haversine distance (metres) ───────────────────────────────────────────────
function haversine(a,b,c,d) {
  var R=6371000, dL=(c-a)*Math.PI/180, dN=(d-b)*Math.PI/180;
  var x=Math.sin(dL/2)*Math.sin(dL/2)+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dN/2)*Math.sin(dN/2);
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

// ── Main navigation ───────────────────────────────────────────────────────────
function startNav() {
  var key  = document.getElementById('apiKey').value.trim();
  var dest = document.getElementById('dest').value.trim();
  var base = getArduinoUrl();

  if (!key)  { log('Enter your Google Maps API key', 'err'); return; }
  if (!dest) { log('Enter a destination', 'err'); return; }
  if (!base) { log('Enter the Arduino ngrok URL', 'err'); return; }

  document.getElementById('goBtn').disabled = true;
  log('Getting GPS position...', 'info');

  navigator.geolocation.getCurrentPosition(function(pos) {
    var lat = pos.coords.latitude, lng = pos.coords.longitude;
    log('GPS: ' + lat.toFixed(5) + ', ' + lng.toFixed(5), 'ok');

    var url = 'https://maps.googleapis.com/maps/api/directions/json'
      + '?origin='      + lat + ',' + lng
      + '&destination=' + encodeURIComponent(dest)
      + '&mode=walking&key=' + key;

    log('Fetching route...', 'info');
    fetch(url)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        document.getElementById('goBtn').disabled = false;

        if (data.status !== 'OK') {
          log('Google API error: ' + data.status + ' ' + (data.error_message||''), 'err');
          return;
        }

        var legs = data.routes[0].legs[0];
        steps = legs.steps.map(function(s) {
          return {
            instruction: strip(s.html_instructions),
            maneuver:    s.maneuver || '',
            distText:    s.distance.text,
            endLat:      s.end_location.lat,
            endLng:      s.end_location.lng
          };
        });
        steps.push({
          instruction: 'Arrived at ' + legs.end_address,
          maneuver: 'destination',
          distText: '',
          endLat: legs.end_location.lat,
          endLng: legs.end_location.lng
        });

        log('Route: ' + legs.distance.text + ', ~' + legs.duration.text + ' · ' + (steps.length-1) + ' steps', 'ok');

        going = true;
        document.getElementById('goBtn').style.display   = 'none';
        document.getElementById('stopBtn').style.display = 'block';
        showStep(0);

        // GPS watch — auto advance when within 20m of waypoint
        watchId = navigator.geolocation.watchPosition(function(p) {
          if (!going || !steps.length) return;
          var s = steps[cur];
          if (s && haversine(p.coords.latitude, p.coords.longitude, s.endLat, s.endLng) < 20) {
            log('Waypoint reached', 'info');
            showStep(cur + 1);
          }
        }, null, { enableHighAccuracy: true, maximumAge: 2000 });

      })
      .catch(function(e) {
        document.getElementById('goBtn').disabled = false;
        log('Fetch error: ' + e.message, 'err');
      });

  }, function(e) {
    document.getElementById('goBtn').disabled = false;
    log('GPS error: ' + e.message, 'err');
  }, { timeout: 10000, enableHighAccuracy: true });
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadSettings();
</script>
</body>
</html>
